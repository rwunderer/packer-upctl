name: Auto-Tag

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

on:
  pull_request:
    types: [ "closed" ]

jobs:
  update_tag:
    permissions:
      contents: write

    uses: rwunderer/renovate/.github/workflows/reusable-auto-tag.yml@7ed9f97d0cc91398696e42bb38f670da46d09019 # main
    with:
      regex-pattern: "PACKER_VERSION=(\\d+\\.\\d+\\.\\d+)"
      tag-prefix: "v"
    secrets: inherit
